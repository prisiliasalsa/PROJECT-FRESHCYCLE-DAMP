<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Reminder
    </title>

    <!-- GLOBAL CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- REMINDER CSS -->
    <link rel="stylesheet" href="css/reminder.css">

</head>

<body>

    <div class="mobile-container">

        <!-- HEADER -->
        <div class="reminder-header">

                <div class="header-top">

                    <div class="header-text">

                        <h1>
                            Expiration Alerts
                        </h1>

                        <p>
                            Items that need your attention!
                        </p>

                    </div>

            <img
                src="image/ikon/bell_white_bold.png"
                alt="bell"
                class="bell-icon"
            >

            </div>

        </div>

        <!--FILTER SECTION-->
    
        <div class="filter-container">

            <button class="filter-btn active-btn">
                All
            </button>

            <button class="filter-btn">
                Fresh
            </button>

            <button class="filter-btn">
                Expiring Soon
            </button>

            <button class="filter-btn">
                Expired
            </button>

        </div>

        <!-- FOOD LIST -->

        <div class="food-list">

            <!-- FOOD CARD -->

            <div class="food-card warning-card">

                <div class="food-top">

                    <!-- IMAGE -->

                    <div class="food-image">

                        <img
                            src="image/foods/carrot.png"
                            alt="carrot"
                        >

                    </div>

                    <!-- DETAIL -->

                    <div class="food-detail">

                        <h3>
                            Carrot
                        </h3>

                        <p>
                            Recommended for upcoming meals
                        </p>

                        <span>
                            ⏰ 7 Days Left
                        </span>

                    </div>

                </div>

                <!-- BUTTON -->

                <button class="use-btn">

                    Use Now

                </button>

            </div>

        </div>

    </div>

</body>

</html>
